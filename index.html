<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Voice Assistant</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      cursor: pointer;
    }

    #log {
      margin-top: 20px;
      font-size: 18px;
      color: #333;
    }

    .card {
      margin-top: 40px;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>🤖 AI Voice Assistant (Free)</h1>

<button onclick="startVoice()">🎤 Speak</button>

<div id="log">Say something...</div>

<div class="card">
  Try:
  <br>• open youtube
  <br>• play lo-fi music
  <br>• search best phone
  <br>• scroll down
  <br>• go home
</div>

<script>
/* =========================
   🧠 AI BRAIN (NO API)
========================= */

function aiUnderstand(text) {
  text = text.toLowerCase();

  // Return structured "intent object"
  if (text.includes("open youtube"))
    return { action: "open", target: "youtube" };

  if (text.includes("open google"))
    return { action: "open", target: "google" };

  if (text.includes("play"))
    return { action: "play", query: text.replace("play", "").trim() };

  if (text.includes("search"))
    return { action: "search", query: text.replace("search", "").trim() };

  if (text.includes("scroll down"))
    return { action: "scroll", direction: "down" };

  if (text.includes("scroll up"))
    return { action: "scroll", direction: "up" };

  if (text.includes("home"))
    return { action: "home" };

  return { action: "unknown", text };
}

/* =========================
   ⚙️ EXECUTOR ENGINE
========================= */

function execute(command) {
  console.log("AI Command:", command);

  document.getElementById("log").innerText =
    "AI understood: " + JSON.stringify(command);

  switch (command.action) {

    case "open":
      if (command.target === "youtube") {
        window.open("https://youtube.com", "_blank");
      }
      if (command.target === "google") {
        window.open("https://google.com", "_blank");
      }
      break;

    case "play":
      window.open(
        "https://www.youtube.com/results?search_query=" +
          encodeURIComponent(command.query),
        "_blank"
      );
      break;

    case "search":
      window.open(
        "https://www.google.com/search?q=" +
          encodeURIComponent(command.query),
        "_blank"
      );
      break;

    case "scroll":
      if (command.direction === "down") window.scrollBy(0, 500);
      if (command.direction === "up") window.scrollBy(0, -500);
      break;

    case "home":
      window.location.href = "/";
      break;

    default:
      alert("I didn't understand that 😅");
  }
}

/* =========================
   🎤 VOICE INPUT
========================= */

function startVoice() {
  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Speech API not supported in this browser");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "en-US";
  recognition.interimResults = false;

  recognition.start();

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    console.log("Heard:", text);

    const command = aiUnderstand(text);
    execute(command);
  };
}
</script>

</body>
</html>
